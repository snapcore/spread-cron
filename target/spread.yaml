project: build-spread

path: /root/spread

environment:
    PROJECT_PATH: /root/spread

backends:
    google:
        key: "$(HOST: echo $SPREAD_GOOGLE_KEY)"
        location: snapd-spread/us-east1-b
        halt-timeout: 2h
        systems:
            - ubuntu-20.04-64

suites:
    tasks/:
        summary: Generic automatable tasks